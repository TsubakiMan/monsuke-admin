<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<style>

  .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#94A3B8}

</style>
</head>

    <line x1="660" y1="292" x2="620" y2="330" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr1)"/>

    <text x="635" y="354" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">オーナー管理者</text>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#EA580C"></div>法人オーナー</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2563EB"></div>法人管理者</div>

    <div class="legend-item"><div class="legend-dot" style="background:#475569"></div>サブ管理者/閲覧者</div>
  </div>
</div>

<!-- ===== 3. ログインフロー ===== -->
<div class="section">
  <h2><span>3</span>ログインフロー</h2>
  <svg viewBox="0 0 840 520" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arr3" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/></marker>
      <marker id="arr3g" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#059669"/></marker>
      <marker id="arr3r" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#DC2626"/></marker>
    </defs>

    <!-- Step 1: ログイン -->
    <rect x="300" y="10" width="240" height="56" rx="10" fill="#E97316" filter="url(#glow)"/>
    <text x="420" y="34" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">ログイン画面</text>
    <text x="420" y="52" text-anchor="middle" fill="#FFEDD5" font-size="11">メールアドレス + パスワード</text>

    <line x1="420" y1="66" x2="420" y2="96" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr3)"/>

    <!-- Step 2: 認証 -->
    <polygon points="420,100 520,140 420,180 320,140" fill="#334155" stroke="#64748B"/>
    <text x="420" y="144" text-anchor="middle" fill="#E2E8F0" font-size="12" font-weight="600">認証成功？</text>

    <!-- 失敗 -->
    <line x1="520" y1="140" x2="620" y2="140" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arr3r)"/>
    <text x="570" y="132" text-anchor="middle" fill="#F87171" font-size="10">失敗</text>
    <rect x="620" y="118" width="140" height="44" rx="8" fill="#2D1517" stroke="#DC2626"/>
    <text x="690" y="144" text-anchor="middle" fill="#F87171" font-size="12" font-weight="600">エラー表示</text>
    <path d="M690,162 L690,180 L280,180 L280,38 L300,38" fill="none" stroke="#DC2626" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr3r)"/>

    <!-- 成功 -->
    <line x1="420" y1="180" x2="420" y2="210" stroke="#059669" stroke-width="1.5" marker-end="url(#arr3g)"/>
    <text x="434" y="200" fill="#34D399" font-size="10">成功</text>

    <!-- Step 3: 権限取得 -->
    <rect x="280" y="210" width="280" height="50" rx="10" fill="#2563EB" filter="url(#glow)"/>
    <text x="420" y="234" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">メールに紐づく権限・アカウント取得</text>
    <text x="420" y="250" text-anchor="middle" fill="#BFDBFE" font-size="10">DB照会</text>

    <line x1="420" y1="260" x2="420" y2="290" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr3)"/>

    <!-- Step 4: 複数判定 -->
    <polygon points="420,294 540,334 420,374 300,334" fill="#334155" stroke="#64748B"/>
    <text x="420" y="330" text-anchor="middle" fill="#E2E8F0" font-size="11" font-weight="600">複数アカウント</text>
    <text x="420" y="346" text-anchor="middle" fill="#E2E8F0" font-size="11" font-weight="600">が存在する？</text>

    <!-- 1つだけ -->
    <line x1="540" y1="334" x2="680" y2="334" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr3)"/>
    <text x="610" y="326" text-anchor="middle" fill="#94A3B8" font-size="10">1つだけ</text>
    <rect x="680" y="312" width="140" height="44" rx="8" fill="#059669"/>
    <text x="750" y="338" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">直接遷移</text>

    <!-- 複数あり -->
    <line x1="420" y1="374" x2="420" y2="404" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr3)"/>
    <text x="434" y="394" fill="#94A3B8" font-size="10">複数あり</text>

    <!-- Step 5: 切替UI -->
    <rect x="260" y="404" width="320" height="50" rx="10" fill="#7C3AED" filter="url(#glow)"/>
    <text x="420" y="428" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">アカウント切替UI</text>
    <text x="420" y="444" text-anchor="middle" fill="#DDD6FE" font-size="10">操作するアカウントを選択</text>

    <!-- 遷移先 -->
    <line x1="340" y1="454" x2="180" y2="482" stroke="#E97316" stroke-width="1.5" marker-end="url(#arr3)"/>
    <line x1="500" y1="454" x2="660" y2="482" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arr3)"/>
    <line x1="750" y1="356" x2="750" y2="482" stroke="#64748B" stroke-width="1.5" marker-end="url(#arr3)"/>

    <rect x="60" y="480" width="240" height="40" rx="8" fill="#E97316"/>
    <text x="180" y="504" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">法人管理画面へ</text>

    <rect x="540" y="480" width="280" height="40" rx="8" fill="#0891B2"/>
    <text x="680" y="504" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">事業所管理画面へ</text>
  </svg>
</div>

<!-- ===== 4. 同一メールアドレスの権限解決 ===== -->

      <marker id="arr4" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/></marker>
    </defs>

    <!-- ユーザー -->
